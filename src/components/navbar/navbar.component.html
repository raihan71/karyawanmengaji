<nav class="bg-white/95 backdrop-blur z-20 w-full border-gray-200 border-b shadow-sm" [ngClass]="isNavbarFixed ? 'fixed top-0 left-0 right-0' : ''" (scroll) = "onScroll()">
  <div class="max-w-screen-xl flex flex-wrap items-center justify-between mx-auto px-4 py-3">
    <a routerLink="/home" class="flex items-center space-x-3 rtl:space-x-reverse">
        <img [src]="logo || 'assets/img/qlc-logo.png'" loading="eager" class="h-11 md:h-10 w-auto" alt="Qlc logo" title="" />
        <span class="hidden md:block text-lg font-bold whitespace-nowrap text-gray-900">{{name}}</span>
    </a>
    <button (click)="handleShowMenuMobile()" data-collapse-toggle="navbar-default" type="button" class="inline-flex items-center p-2 w-10 h-10 justify-center text-sm text-gray-500 rounded-lg md:hidden hover:bg-gray-100 focus:outline-none focus:ring-2 focus:ring-gray-200" aria-controls="navbar-default" [ariaExpanded]="showMenuMobile">
        <span class="sr-only">Open main menu</span>
        <svg class="w-5 h-5" aria-hidden="true" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 17 14">
            <path stroke="currentColor" stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M1 1h15M1 7h15M1 13h15"/>
        </svg>
    </button>
    <div [ngClass]="showMenuMobile ? '' : 'hidden'" class="w-full md:block md:w-auto" id="navbar-default">
      <ul class="font-semibold flex flex-col p-3 md:p-0 mt-4 border border-gray-100 rounded-lg bg-white shadow-lg md:shadow-none md:flex-row md:space-x-7 rtl:space-x-reverse md:mt-0 md:border-0">
        <li>
          <a routerLink="/home" routerLinkActive="active" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:border-0 md:hover:text-green-500 md:p-0" (click)="handleShowMenuMobile()">Beranda</a>
        </li>
        <li>
          <a routerLink="/program" routerLinkActive="active" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:border-0 md:hover:text-green-500 md:p-0" (click)="handleShowMenuMobile()">Program</a>
        </li>
        <li>
          <a routerLink="/about" routerLinkActive="active" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:border-0 md:hover:text-green-500 md:p-0" (click)="handleShowMenuMobile()">Tentang Kami</a>
        </li>
        <li>
          <a routerLink="/news" routerLinkActive="active" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:border-0 md:hover:text-green-500 md:p-0" (click)="handleShowMenuMobile()">Berita</a>
        </li>
        <li>
          <a routerLink="/knowledge" routerLinkActive="active" class="block py-2 px-3 text-gray-900 rounded hover:bg-gray-100 md:hover:bg-transparent md:border-0 md:hover:text-green-500 md:p-0" (click)="handleShowMenuMobile()">Artikel</a>
        </li>
      </ul>
    </div>
  </div>
</nav>

<div class="max-w-screen-xl mx-auto px-5">
  <div class="grid grid-cols-1 md:grid-cols-3 sm:grid-cols-2 gap-6 md:gap-8">
    @for (item of items; track $index) {
    <a
      [routerLink]="[linkDetail, item?.sys?.id]"
      class="relative aspect-[5/4] w-full flex flex-col justify-end bg-cover bg-center rounded-lg shadow-lg overflow-hidden transition duration-200 hover:-translate-y-1 hover:shadow-xl"
      [style.background-image]="
        item.image ? 'url(' + item.image + ')' : 'url(' + img + ')'
      "
    >
      <!-- Gradient Overlay -->
      <div
        class="absolute inset-0 bg-gradient-to-t from-black/85 via-black/25 to-transparent"
      ></div>

      <!-- Top Section: Category and Date -->
      <div
        class="absolute top-0 left-0 right-0 flex justify-between items-center p-4"
      >
        <span
          class="text-xs bg-green-700 text-white px-3 py-1 uppercase rounded-full"
        >
          {{ item?.fields?.category }}
        </span>
        <div class="text-white text-right">
          <span
            class="block text-sm font-semibold"
            style="text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8)"
            >{{ item?.sys?.createdAt | date : "YYYY" }}</span
          >
          <span
            class="block text-2xl font-bold"
            style="text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8)"
            >{{ item?.sys?.createdAt | date : "dd" }}</span
          >
          <span
            class="block text-sm"
            style="text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8)"
            >{{ item?.sys?.createdAt | date : "LLL" }}</span
          >
        </div>
      </div>

      <!-- Main Content: Title -->
      <main class="relative z-10 p-5">
        <span
          class="block text-lg font-bold text-white leading-tight hover:underline"
        >
          {{ item?.fields?.title | ellipsis : 83 }}
        </span>
      </main>
    </a>
    }
  </div>
</div>

  <div class="surface-card p-4">
      <h2 class="text-xl font-bold text-gray-900 mb-4">{{title}}</h2>
        <ul class="list-none divide-y divide-gray-100">
          @for (item of items; track $index) {
            <li class="py-3 first:pt-0 last:pb-0">
                <a (click)="goToPage(linkDetail,item?.sys?.id)" class="text-gray-700 hover:text-green-700 leading-6 cursor-pointer hover:underline">{{item?.fields?.title | ellipsis: 64}}</a>
            </li>
          }
        </ul>
  </div>

<main class="page-shell">
  <section>
      <div class="gap-12 items-center section-container lg:grid lg:grid-cols-2">
          <div class="font-light text-gray-500 sm:text-lg">
              <p class="section-kicker mb-3">Tentang Kami</p>
              <h2 class="section-title mb-5">Profil QLC</h2>
              <img class="object-scale-down h-14 w-14 mb-4" [src]="about.image || 'assets/img/qlc-logo.png'" alt="logo-qlc" loading="lazy" decoding="async" />
              <p class="section-desc mb-4">{{about.profile}}</p>
          </div>
          <div class="grid grid-cols-2 gap-4 mt-8 lg:mt-0">
              <div class="media-frame aspect-[3/4]">
                <img [src]="galleries[0].img1" [alt]="galleries[0].fields.title" loading="lazy" decoding="async">
              </div>
              <div class="media-frame aspect-[3/4] mt-8 lg:mt-12">
                <img [src]="galleries[0].img2" [alt]="galleries[0].fields.title" loading="lazy" decoding="async">
              </div>
          </div>
      </div>
      <app-faq [questions]="questions" title="Visi & Misi" followUp="" />
  </section>
</main>

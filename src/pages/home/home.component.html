<main class="page-shell">
  <section>
    <div class="grid max-w-screen-xl px-4 py-12 mx-auto gap-10 lg:py-20 lg:grid-cols-12">
      <div class="mr-auto place-self-center lg:col-span-7">
        <p class="section-kicker mb-3">Quuantum Learning Center</p>
        <h1 class="max-w-2xl mb-5 text-4xl font-extrabold leading-tight text-gray-950 md:text-5xl">
          {{ aboutMe.judulHeroAtas }}
        </h1>
        <p class="max-w-2xl mb-7 text-gray-600 leading-8 md:text-lg">
          {{ aboutMe.subjudulHeroAtas }}
        </p>
        <a routerLink="/program" class="btn-primary mr-3">
          Mulai sekarang
          <svg
            class="w-5 h-5 ml-2 -mr-1"
            fill="currentColor"
            viewBox="0 0 20 20"
            xmlns="http://www.w3.org/2000/svg"
          >
            <path
              fill-rule="evenodd"
              d="M10.293 3.293a1 1 0 011.414 0l6 6a1 1 0 010 1.414l-6 6a1 1 0 01-1.414-1.414L14.586 11H3a1 1 0 110-2h11.586l-4.293-4.293a1 1 0 010-1.414z"
              clip-rule="evenodd"
            ></path>
          </svg>
        </a>
        <a routerLink="/" class="btn-secondary"> Hubungi kami </a>
      </div>
      <div class="hidden lg:mt-6 lg:col-span-5 lg:block">
        <div id="productPhotos" class="surface-card p-3">
          <app-carousel [items]="heros" [customOptions]="photoOptions" [type]="2" />
        </div>
      </div>
    </div>
  </section>
  <section id="galleryPhotos" class="mb-8">
    <app-carousel [items]="galleries" [customOptions]="galleryOptions" [type]="1" />
  </section>
  <app-clients [items]="clients" />
  <app-feature
    [title]="aboutMe.judulFiturTengah"
    [desc]="aboutMe.subjudulFiturTengah"
    [items]="features"
  />
  <app-cardlist ids="Program" title="Program Kami" [items]="programs" />
  <app-faq
    title="Sering Ditanyakan"
    followUp="Masih punya pertanyaan?"
    callUs="Hubungi kami"
    [questions]="faqs"
  />
</main>

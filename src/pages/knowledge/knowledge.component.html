<main class="page-shell">
  <section>
    <div class="section-container pb-6">
        <div class="max-w-screen-md">
            <p class="section-kicker mb-3">Artikel</p>
            <h2 class="section-title mb-4">Pustaka Ilmu</h2>
            <p class="section-desc">Menyajikan artikel-artikel menarik seputar pembahasan ilmu agama.</p>
        </div>
    </div>
    @if (news.length > 0) {
      <div class="mb-10">
        <app-newslist linkDetail="/knowledge" [items]="news" />
      </div>
      <div class="flex items-center justify-center">
        <nav aria-label="Page navigation example">
          <ul class="inline-flex -space-x-px text-base h-10">
            <li class="{{currentPage === 1 ? 'text-muted' : ''}}">
              <button (click)="previousPage()" [disabled]="currentPage === 1" class="btn-secondary disabled:opacity-40 disabled:pointer-events-none">Previous</button>
            </li>
            <li class="{{!hasNextPage ? 'text-muted' : ''}}">
              <button (click)="nextPage()" [disabled]="!hasNextPage" class="btn-secondary disabled:opacity-40 disabled:pointer-events-none">Next</button>
            </li>
          </ul>
        </nav>
      </div>
    }
  </section>
</main>

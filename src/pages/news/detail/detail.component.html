<main class="page-shell">
  <section>
    <div class="max-w-screen-xl mx-auto p-5">
      <div class="py-10 border-b border-gray-200">
        <div class="container mx-auto">
          <p class="section-kicker mb-3">Berita</p>
          <h1 class="text-3xl md:text-5xl font-extrabold text-gray-950 mb-3 leading-tight">
            {{ news?.fields?.title }}
          </h1>
          <p class="text-gray-600">
            Diterbitkan pada {{ news?.sys?.createdAt | date: 'longDate' }}
          </p>
        </div>
      </div>
      <div class="py-8">
        <div class="container mx-auto flex flex-col md:flex-row gap-8">
          <div class="w-full md:w-3/4">
            <img
              [src]="news?.img"
              [alt]="news?.fields?.title"
              class="object-cover h-80 md:h-96 w-full mb-8 bg-zinc-200 rounded-lg"
              loading="eager"
              decoding="async"
            />
            <div class="rich-text-content">
              <div [innerHTML]="news?.fields?.desc | toHtml"></div>
            </div>
          </div>
          <div class="w-full md:w-1/3 py-4 md:py-0">
            <app-sidenews linkDetail="/knowledge" title="Kajian Ilmu Terbaru" [items]="articles" />
          </div>
        </div>
      </div>
      <script
        async
        src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3346716446651151"
        crossorigin="anonymous"
      ></script>
      <ins
        class="adsbygoogle"
        style="display: block; text-align: center"
        data-ad-layout="in-article"
        data-ad-format="fluid"
        data-ad-client="ca-pub-3346716446651151"
        data-ad-slot="5754050202"
      ></ins>
      <script>
        (adsbygoogle = window.adsbygoogle || []).push({});
      </script>
      <section class="bg-white md:border-t-2 py-8 antialiased">
        <div class="mx-auto">
          <app-disqus-embed
            [pageUrl]="pageUrl"
            [pageIdentifier]="pageIdentifier"
            title="Join the discussion"
          />
        </div>
      </section>
    </div>
  </section>
</main>
